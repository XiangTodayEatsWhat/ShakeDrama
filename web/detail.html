    // 加载某集剧本版本历史（剧本审稿右侧面板）
    async function loadScriptEpisodeVersions(epNum) {
      const listEl = document.getElementById('scriptVersionList');
      if (!listEl) return;
      const activeBtn = document.querySelector('.script-ep-btn-active');
      const ep = epNum != null ? epNum : (activeBtn ? parseInt(activeBtn.getAttribute('data-ep'), 10) : 1);
      const field = 'script_ep_' + ep;
      try {
        const token = localStorage.getItem('auth_token');
        const res = await fetch('/api/projects/' + projectId + '/versions/' + encodeURIComponent(field) + '?_t=' + Date.now(), {
          headers: { 'Authorization': 'Bearer ' + (token || ''), 'Cache-Control': 'no-cache' }
        });
        const data = await res.json();
        const all = (data.versions || []).slice().reverse();
        // 显示全部版本（最新在前），这样手动编辑保存后顶部就是「手动编辑」，不会误以为显示的是「上一次多轮对话」
        var rawVersions = all;
        // 展示去重：连续两条 (user_message+content) 或 (user_message+timestamp) 相同视为重复，只显示一条
        var versions = rawVersions.filter(function(v, i) {
          if (i === 0) return true;
          var prev = rawVersions[i - 1];
          var sameMsg = (prev.user_message || '') === (v.user_message || '');
          var sameContent = (prev.content || '') === (v.content || '');
          var sameTs = (prev.timestamp || '') === (v.timestamp || '');
          if (sameMsg && sameContent) return false;
          if (sameMsg && sameTs) return false;
          return true;
        });
        listEl.innerHTML = '';
        if (versions.length === 0) {
          listEl.innerHTML = '<div style="color:#999;font-size:13px;text-align:center;padding:16px;">该集暂无历史版本</div>';
          return;
        }
        // 多条时：最早一条空 user_message 显示「原始版本」，其余空显示「自动保存 时间」，有 user_message 显示摘要
        var emptyMsgVersions = versions.filter(function(v) { return !(v.user_message || '').trim(); });
        var originalTimestamp = emptyMsgVersions.length ? emptyMsgVersions.reduce(function(earliest, v) {
          var t = v.timestamp ? new Date(v.timestamp).getTime() : 0;
          return t && (!earliest || t < earliest) ? t : earliest;
        }, null) : null;
        var shownOriginal = false;
        versions.forEach(function(v, idx) {
          const ts = v.timestamp ? new Date(v.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
          const msg = (v.user_message || '').trim();
          var label;
          if (msg) {
            label = msg.length > 28 ? msg.substring(0, 28) + '…' : msg;
          } else {
            var isEarliestEmpty = originalTimestamp != null && v.timestamp && new Date(v.timestamp).getTime() === originalTimestamp && !shownOriginal;
            if (isEarliestEmpty) shownOriginal = true;
            label = isEarliestEmpty ? '原始版本' : ('自动保存 ' + (ts || ''));
          }
          const item = document.createElement('div');
          item.className = 'script-version-item';
          item.style.cssText = 'padding:10px 12px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:13px;line-height:1.4;user-select:none;position:relative;z-index:1;';
          item.innerHTML = (label ? '<div style="font-weight:600;color:#313131;">' + escapeHtml(label) + '</div>' : '') + '<div style="color:#999;font-size:11px;margin-top:4px;">' + ts + '</div>';
          (function(versionContent, epNum) {
            item.onclick = function() {
              var list = document.getElementById('scriptVersionList');
              if (list) {
                var siblings = list.querySelectorAll('.script-version-item');
                siblings.forEach(function(el) {
                  el.classList.remove('script-version-item-active');
                  el.style.background = '';
                  el.style.borderColor = '';
                });
              }
              item.classList.add('script-version-item-active');
              var content = (versionContent || '').trim();
              var displayEl = document.getElementById('scriptDisplay_' + epNum);
              var rawEl = document.getElementById('scriptRaw_' + epNum);
              if (displayEl && rawEl && typeof formatScriptDisplay === 'function') {
                rawEl.value = content;
                displayEl.innerHTML = formatScriptDisplay(content);
                displayEl.style.display = 'block';
                var editWrap = document.getElementById('scriptEditWrap_' + epNum);
                if (editWrap) editWrap.style.display = 'none';
              }
            };
          })(v.content, ep);
          listEl.appendChild(item);
        });
      } catch (e) {
        listEl.innerHTML = '<div style="color:#c00;font-size:13px;">加载失败</div>';
      }
    }
    
    // 剧本审稿：按集提交修改意见 → 走 chat 流式重写，就地更新剧本（不弹二次弹窗、不关弹窗）
    // 始终以「当前左侧可见的那一集」为准，避免点第1集却改到第5集
    async function submitScriptReviewFeedback(episodeNumber) {
      var visibleBody = null;
      var bodies = document.querySelectorAll('.script-ep-body');
      for (var b = 0; b < bodies.length; b++) {
        if (bodies[b].style.display === 'block') { visibleBody = bodies[b]; break; }
      }
      var epNum = episodeNumber;
      if (visibleBody && visibleBody.id && visibleBody.id.indexOf('scriptBody_') === 0) {
        epNum = parseInt(visibleBody.id.replace('scriptBody_', ''), 10) || episodeNumber;
      }
      const ta = document.getElementById('scriptReviewFeedback_' + epNum);
      const feedback = (ta && ta.value) ? ta.value.trim() : '';
      if (!feedback) {
        await showAlert('请输入对该集的修改意见', 'warning');
        return;
      }
      const rawTa = document.getElementById('scriptRaw_' + epNum);
      const currentScript = (rawTa && rawTa.value) ? rawTa.value : '';
      const box = document.getElementById('scriptContentBox_' + epNum);
      const display = document.getElementById('scriptDisplay_' + epNum);
      const editWrap = document.getElementById('scriptEditWrap_' + epNum);
      const submitBtn = document.querySelector('#scriptBody_' + epNum + ' button[onclick*="submitScriptReviewFeedback"]') || document.querySelector('#scriptBody_' + epNum + ' button');
      if (!box || !display) return;
      if (submitBtn) submitBtn.disabled = true;
      display.style.display = 'none';
      if (editWrap) editWrap.style.display = 'none';
      var streamDiv = document.createElement('div');
      streamDiv.id = 'scriptStream_' + epNum;
      streamDiv.style.cssText = 'height:100%;overflow-y:auto;white-space:pre-wrap;word-break:break-word;font-size:15px;line-height:1.6;';
      streamDiv.textContent = '正在根据您的意见重写本集…';
      box.appendChild(streamDiv);
      var accumulated = '';
      try {
        const token = localStorage.getItem('auth_token');
        const response = await fetch('/api/projects/' + projectId + '/chat', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: feedback,
            field: 'script_ep_' + epNum,
            current_content: currentScript
          })
        });
        if (!response.ok) {
          streamDiv.textContent = '请求失败，请重试';
          if (submitBtn) submitBtn.disabled = false;
          box.removeChild(streamDiv);
          display.style.display = 'block';
          return;
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (value && value.length) buffer += decoder.decode(value, { stream: true });
          var lines = buffer.split('\n');
          if (!done) { buffer = lines.pop() || ''; } else { buffer = ''; }
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (!line.startsWith('data: ')) continue;
            try {
              var data = JSON.parse(line.slice(6));
              if (data.error) {
                streamDiv.textContent = '生成失败：' + data.error;
                if (submitBtn) submitBtn.disabled = false;
                box.removeChild(streamDiv);
                display.style.display = 'block';
                return;
              }
              if (data.chunk) {
                accumulated += data.chunk;
                streamDiv.textContent = accumulated || '正在输出…';
                streamDiv.scrollTop = streamDiv.scrollHeight;
              }
              if (data.done && data.final_content != null) accumulated = data.final_content;
            } catch (_) {}
          }
          if (done) break;
        }
        var finalContent = (accumulated || '').trim();
        if (!finalContent) {
          streamDiv.textContent = '未获取到有效内容，请重试';
          if (submitBtn) submitBtn.disabled = false;
          box.removeChild(streamDiv);
          display.style.display = 'block';
          return;
        }
        var applyRes = await fetch('/api/projects/' + projectId + '/script_episode/apply_content', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + (token || ''), 'Content-Type': 'application/json' },
          body: JSON.stringify({ episode_number: epNum, content: finalContent, user_message: feedback })
        });
        if (!applyRes.ok) {
          var errData = await applyRes.json().catch(function() { return {}; });
          streamDiv.textContent = '保存失败：' + (errData.detail || applyRes.status);
          if (submitBtn) submitBtn.disabled = false;
          box.removeChild(streamDiv);
          display.style.display = 'block';
          return;
        }
        await applyRes.json().catch(function() { return {}; });
        box.removeChild(streamDiv);
        rawTa.value = finalContent;
        display.innerHTML = formatScriptDisplay(finalContent);
        display.style.display = 'block';
        ta.value = '';
        if (submitBtn) submitBtn.disabled = false;
        var field = 'script_ep_' + epNum;
        await saveVersion(field, finalContent, feedback, finalContent, undefined);
        await loadScriptEpisodeVersions(epNum);
      } catch (e) {
        if (streamDiv.parentNode) {
          streamDiv.textContent = '提交失败：' + e.message;
          if (submitBtn) submitBtn.disabled = false;
          setTimeout(function() {
            if (streamDiv.parentNode) box.removeChild(streamDiv);
            display.style.display = 'block';
          }, 2000);
        }
      }
    }

    // 保存并继续
    async function saveAndContinue() {
      // 剧本审稿：保存当前集当前显示的内容（含选中的中间版本）到 bible；已完成项目只保存并关闭，不调用「继续下一批」
      var isScriptReview = project.script_review_batch_end != null || (project.status === 'completed' && (project.current_episode || 0) >= (project.total_episodes || 80));
      if (isScriptReview) {
        const activeBtn = document.querySelector('.script-ep-btn-active');
        const epNum = activeBtn ? parseInt(activeBtn.getAttribute('data-ep'), 10) : null;
        if (epNum != null) {
          const editWrap = document.getElementById('scriptEditWrap_' + epNum);
          const isEditMode = editWrap && editWrap.style.display !== 'none';
          const rawEl = document.getElementById('scriptRaw_' + epNum);
          const editEl = document.getElementById('scriptEdit_' + epNum);
          const content = isEditMode && editEl ? (editEl.value || '').trim() : (rawEl ? (rawEl.value || '').trim() : '');
          if (content) {
            try {
              await saveScriptEpisode(epNum, content);
              var listEl = document.getElementById('scriptVersionList');
              if (listEl && listEl.parentElement) {
                var tip = document.getElementById('scriptReviewSaveTip');
                if (tip) tip.remove();
                tip = document.createElement('div');
                tip.id = 'scriptReviewSaveTip';
                tip.style.cssText = 'padding:8px 12px;background:#e8f5e9;color:#2e7d32;border-radius:8px;font-size:13px;margin-bottom:10px;';
                tip.innerHTML = '<i class="bi bi-check-circle"></i> 已保存当前集';
                listEl.parentElement.insertBefore(tip, listEl);
                setTimeout(function() { var t = document.getElementById('scriptReviewSaveTip'); if (t) t.remove(); }, 2500);
              }
            } catch (e) {
              await showAlert('保存当前集失败: ' + (e.message || e), 'error');
              return;
            }
          }
        }
        // 已完成项目：保存后直接关闭弹窗，不调用「继续下一批」
        if (project.status === 'completed') {
          closeReviewModal();
          return;
        }
        return;
      }
      const ideationStage = project.ideation_stage || 'not_started';
      
      // 收集修改的数据
      let updates = {};
      
      if (ideationStage === 'inspiration') {
        const inspiration = document.getElementById('reviewInspiration')?.value;
        if (inspiration && inspiration.trim()) {
          updates.inspiration = inspiration.trim();
        }
      } else if (ideationStage === 'synopsis') {
        const title = document.getElementById('reviewTitle')?.value;
        const synopsis = document.getElementById('reviewSynopsis')?.value;
        const genre = document.getElementById('reviewGenre')?.value;
        
        if (title) updates.title = title.trim();
        if (synopsis) updates.synopsis = synopsis.trim();
        if (genre) updates.genre = genre.trim();
      } else if (ideationStage === 'overall_outline') {
        const outline = document.getElementById('reviewOutline')?.value;
        if (outline) updates.overall_outline = outline.trim();
      } else if (ideationStage === 'multi_outline') {
        const multiOutline = document.getElementById('reviewMultiOutline')?.value;
        if (multiOutline) updates.multi_outline = multiOutline.trim();
      } else if (ideationStage === 'completed') {
        const insp = document.getElementById('compInspiration')?.value;
        const syn = document.getElementById('compSynopsis')?.value;
        const outl = document.getElementById('compOutline')?.value;
        const mout = document.getElementById('compMultiOutline')?.value;
        if (insp && insp.trim()) updates.inspiration = insp.trim();
        if (syn && syn.trim()) updates.synopsis = syn.trim();
        if (outl && outl.trim()) updates.overall_outline = outl.trim();
        if (mout && mout.trim()) updates.multi_outline = mout.trim();
      }
      
      // 关闭审核弹窗
      closeReviewModal();
      
      // 显示生成进度弹窗
      showProgressModal();
      
      // 如果有修改，先保存
      if (Object.keys(updates).length > 0) {
        try {
          const token = localStorage.getItem('auth_token');
          const res = await fetch(`/api/projects/${projectId}/update`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(updates)
          });
          
          if (!res.ok) {
            throw new Error('保存修改失败');
          }
          
          // 不显示alert，直接继续
        } catch (err) {
          closeProgressModal();
          await showAlert('保存失败: ' + err.message, 'error');
          return;
        }
      }
      
      // 继续下一步
      await continueProjectWithStream(projectId);
    }

    // 使用流式API继续项目
    async function continueProjectWithStream(projectId) {
      try {
        const token = localStorage.getItem('auth_token');
        
        // 先启动任务
        const startRes = await fetch(`/api/projects/${projectId}/continue`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });
        
        if (!startRes.ok) {
          const data = await startRes.json();
          closeProgressModal();
          await showAlert(data.detail || '启动失败', 'error');
          return;
        }
        
        // 连接流式日志（tail=1 只拉新日志，不重放之前的抓爆款/灵感等）
        const logContainer = document.getElementById('progressLogContainer');
        if (logContainer) {
          logContainer.innerHTML = '';
        }
        
        const streamUrl = `/api/projects/${projectId}/logs/stream?tail=1`;
        const response = await fetch(streamUrl, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) {
          throw new Error('连接日志流失败');
        }
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';
          for (const event of events) {
            const line = event.split('\n')[0];
            if (!line || !line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.log && logContainer) {
                if (data.append === true) {
                  // 二级框（流式生成内容）不显示
                } else {
                  var logText = data.log;
                  var streamInfo = parseStreamLog(logText);
                  if (streamInfo) {
                    // 二级框（STREAM 流式内容）不显示
                  } else if (shouldShowLogLineInUI(logText)) {
                    var isErr = logText.indexOf('[ERROR]') !== -1 || logText.indexOf('错误') !== -1 || logText.indexOf('失败') !== -1;
                    var isSucc = logText.indexOf('[SUCCESS]') !== -1 || logText.indexOf('✅') !== -1;
                    var isWarn = logText.indexOf('[WARNING]') !== -1 || logText.indexOf('警告') !== -1;
                    var isInf = logText.indexOf('[INFO]') !== -1;
                    var logEntry = document.createElement('div');
                    logEntry.style.marginBottom = '4px';
                    logEntry.style.lineHeight = '1.6';
                    logEntry.style.color = isErr ? '#ff6b6b' : (isSucc ? '#51cf66' : (isWarn ? '#ffd43b' : (isInf ? '#4ec9b0' : '#d4d4d4')));
                    logEntry.textContent = logText;
                    logContainer.appendChild(logEntry);
                    logContainer.scrollTop = logContainer.scrollHeight;
                  }
                }
              }
              if (data.done || data.status) {
                setTimeout(() => {
                  closeProgressModal();
                  loadProject();
                }, 1500);
                break;
              }
            } catch (e) {
              console.error('解析日志失败:', e);
            }
          }
        }
      } catch (err) {
        closeProgressModal();
        await showAlert('生成失败: ' + err.message, 'error');
      }
    }

    // 保存版本（parentVersionIndex：基于哪一版修改的，用于分支；不传则后端按「上一版」处理）
    async function saveVersion(field, content, userMessage, aiResponse, parentVersionIndex) {
      try {
        const token = localStorage.getItem('auth_token');
        const body = {
          field: field,
          content: content,
          user_message: userMessage,
          ai_response: aiResponse
        };
        if (parentVersionIndex !== undefined && parentVersionIndex >= 0) {
          body.parent_version_index = parentVersionIndex;
        }
        const response = await fetch(`/api/projects/${projectId}/save_version`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        
        if (!response.ok) {
          throw new Error('保存版本失败');
        }
        
        const result = await response.json();
        
        // 刷新版本列表
        await loadVersionHistory(field);
        
        return result;
      } catch (err) {
        console.error('保存版本失败:', err);
        // 不显示错误提示，静默失败
      }
    }
    
    // 加载版本历史（options.restoreChat === false 时不恢复对话到 #chatHistory，仅更新版本列表）
    async function loadVersionHistory(field, options) {
      var restoreChat = !options || options.restoreChat !== false;
      try {
        const token = localStorage.getItem('auth_token');
        const response = await fetch(`/api/projects/${projectId}/versions/${field}`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) {
          throw new Error('加载版本历史失败');
        }
        
        const data = await response.json();
        const versions = data.versions || [];
        const currentVersion = data.current_version;
        const chatHistory = data.chat_history || [];
        editingBaseVersionIndex[field] = currentVersion >= 0 ? currentVersion : (versions.length ? versions.length - 1 : -1);
        
        // 更新版本列表UI
        const versionList = document.getElementById('versionList');
        if (!versionList) return;
        
        if (versions.length === 0) {
          versionList.innerHTML = '<div style="color: #999; font-size: 13px; text-align: center; padding: 20px;">暂无历史版本</div>';
          return;
        }
        
        versionList.innerHTML = '';
        
        // 显示版本列表（从新到旧）
        versions.slice().reverse().forEach((version, index) => {
          const actualIndex = versions.length - 1 - index;
          const isActive = actualIndex === currentVersion;
          
          const versionItem = document.createElement('div');
          versionItem.style.cssText = `
            padding: 12px;
            background: ${isActive ? 'linear-gradient(135deg, #313131 0%, #4a4a4a 100%)' : 'white'};
            color: ${isActive ? 'white' : '#313131'};
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: ${isActive ? '2px solid #313131' : '1px solid #e0e0e0'};
          `;
          
          const timestamp = new Date(version.timestamp).toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
          
          // 显示用户的prompt，如果没有则显示"初始版本"（图标用 HTML，用户内容需转义）
          let displayHtml = '';
          if (version.user_message && version.user_message.trim()) {
            const raw = version.user_message.length > 60 ? version.user_message.substring(0, 60) + '...' : version.user_message;
            displayHtml = escapeHtml(raw);
          } else {
            displayHtml = '<i class="bi bi-lightbulb"></i> 初始版本';
          }
          
          versionItem.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
              <span style="font-size: 12px; opacity: 0.8;">版本 ${actualIndex + 1}</span>
              <span style="font-size: 11px; opacity: 0.7;">${timestamp}</span>
            </div>
            <div style="font-size: 12px; opacity: 0.9; line-height: 1.4;">${displayHtml}</div>
            ${isActive ? '<div style="margin-top: 6px; font-size: 11px; opacity: 0.8;"><i class="bi bi-check-circle"></i> 当前版本</div>' : ''}
          `;
          
          versionItem.onmouseover = () => {
            if (!isActive) {
              versionItem.style.background = '#f5f5f5';
              versionItem.style.borderColor = '#313131';
            }
          };
          
          versionItem.onmouseout = () => {
            if (!isActive) {
              versionItem.style.background = 'white';
              versionItem.style.borderColor = '#e0e0e0';
            }
          };
          
          versionItem.onclick = async () => {
            // 如果点击的是当前版本，不做任何操作
            if (isActive) {
              return;
            }
            await selectVersion(field, actualIndex);
          };
          
          versionList.appendChild(versionItem);
        });
        
        if (restoreChat) {
          restoreChatHistory(versions, currentVersion);
        }
        
      } catch (err) {
        console.error('加载版本历史失败:', err);
      }
    }
    
    // 选择版本
    async function selectVersion(field, versionIndex, showNotification = false, refreshList = true) {
      try {
        const token = localStorage.getItem('auth_token');
        const response = await fetch(`/api/projects/${projectId}/select_version`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            field: field,
            version_index: versionIndex
          })
        });
        
        if (!response.ok) {
          throw new Error('选择版本失败');
        }
        
        const result = await response.json();
        const content = result.selected_content;
        editingBaseVersionIndex[field] = versionIndex;
        
        // 更新编辑框和显示区域
        if (field === 'inspiration') {
          const textarea = document.getElementById('reviewInspiration');
          const display = document.getElementById('reviewInspiration-display');
          if (textarea) textarea.value = content;
          if (display) display.textContent = content;
        } else if (field === 'synopsis') {
          const textarea = document.getElementById('reviewSynopsis');
          const display = document.getElementById('reviewSynopsis-display');
          if (textarea) textarea.value = content;
          if (display) display.textContent = content;
        } else if (field === 'overall_outline') {
          const textarea = document.getElementById('reviewOutline');
          const display = document.getElementById('reviewOutline-display');
          if (textarea) textarea.value = content;
          if (display) display.textContent = content;
        } else if (field === 'multi_outline') {
          const textarea = document.getElementById('reviewMultiOutline');
          const display = document.getElementById('reviewMultiOutline-display');
          if (textarea) textarea.value = content;
          if (display) display.textContent = content;
        } else if (field === 'characters') {
          try {
            var raw = (content || '').trim();
            var codeMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
            if (codeMatch) raw = (codeMatch[1] || '').trim();
            var parsed = JSON.parse(raw);
            if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
              const token = localStorage.getItem('auth_token');
              const updateRes = await fetch(`/api/projects/${projectId}/update`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ characters: parsed })
              });
              if (updateRes.ok) {
                const bibleRes = await fetch(`/api/projects/${projectId}/bible`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (bibleRes.ok) {
                  const b = await bibleRes.json();
                  window.currentBible = b;
                  window.currentCharacterList = Object.values(b.characters || {});
                }
                refreshCharacterModalContent();
              }
            }
          } catch (e) { console.error('选择人设版本解析失败', e); }
        } else if (field === 'beat_sheet' || (field && field.startsWith('beat_sheet_'))) {
          try {
            var raw = (content || '').trim();
            var parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return;
            var fullEpisodes = (window.currentBible && window.currentBible.beat_sheet && window.currentBible.beat_sheet.episodes) ? window.currentBible.beat_sheet.episodes.slice() : [];
            var merged;
            if (field.startsWith('beat_sheet_')) {
              var parts = field.split('_');
              var batchStart = parseInt(parts[2], 10) || 1;
              var batchEnd = parseInt(parts[3], 10) || 10;
              var byNum = {};
              fullEpisodes.forEach(function(b) { byNum[b.episode || 0] = b; });
              parsed.forEach(function(b) {
                var ep = b.episode || 0;
                if (ep >= batchStart && ep <= batchEnd) byNum[ep] = { episode: ep, synopsis: b.synopsis || '', ending_hook: b.ending_hook || '', hook_type: b.hook_type || '' };
              });
              merged = Object.keys(byNum).map(function(k) { return parseInt(k, 10); }).sort(function(a, b) { return a - b; }).map(function(num) { return byNum[num]; });
            } else {
              merged = parsed;
            }
            const token = localStorage.getItem('auth_token');
            const updateRes = await fetch(`/api/projects/${projectId}/update`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ beat_sheet: { episodes: merged } })
            });
            if (updateRes.ok) {
              if (window.currentBible) {
                window.currentBible.beat_sheet = window.currentBible.beat_sheet || {};
                window.currentBible.beat_sheet.episodes = merged;
              }
              const bibleRes = await fetch(`/api/projects/${projectId}/bible`, { headers: { 'Authorization': `Bearer ${token}` } });
              if (bibleRes.ok) {
                const b = await bibleRes.json();
                window.currentBible = b;
              }
              refreshReviewModalContent();
            }
          } catch (e) { console.error('选择分集大纲版本解析失败', e); }
        } else if (field && field.startsWith('character_')) {
          try {
            var raw = (content || '').trim();
            var codeMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
            if (codeMatch) raw = (codeMatch[1] || '').trim();
            var parsed = JSON.parse(raw);
            var name = (parsed.name || '').trim() || window.currentEditingCharacterName;
            if (name && window.currentBible && window.currentBible.characters) {
              window.currentBible.characters[name] = parsed;
              if (window.currentEditingCharacterName !== name) {
                delete window.currentBible.characters[window.currentEditingCharacterName];
                window.currentEditingCharacterName = name;
              }
              window.currentCharacterList = Object.values(window.currentBible.characters);
              refreshCharacterModalContent();
            }
          } catch (e) { console.error('选择角色版本解析失败', e); }
        }
        
        // 刷新版本列表（更新选中状态）；人物阶段同时恢复该版本对应的历史对话
        if (refreshList) {
          await loadVersionHistory(field, (field === 'beat_sheet' || (field && field.startsWith('character_'))) ? { restoreChat: false } : undefined);
        }
        
        // 只在用户手动切换时显示提示
        if (showNotification) {
          await showAlert('已切换到版本 ' + (versionIndex + 1), 'success');
        }
        
      } catch (err) {
        console.error('选择版本失败:', err);
        if (showNotification) {
          await showAlert('切换版本失败: ' + err.message, 'error');
        }
      }
    }
    
    // 恢复对话历史：只显示「当前版本所在分支」上的对话（从根到当前），不显示其它分支
    function restoreChatHistory(versions, currentVersionIndex) {
      const historyDiv = document.getElementById('chatHistory');
      if (!historyDiv) return;
      
      historyDiv.innerHTML = '';
      if (!versions || versions.length === 0 || currentVersionIndex < 0 || currentVersionIndex >= versions.length) {
        return;
      }
      
      // 从当前版本沿 parent_version_index 回溯到根，得到该分支的版本索引链（含根到当前）
      const path = [];
      let i = currentVersionIndex;
      while (i >= 0) {
        path.unshift(i);
        const parent = versions[i].parent_version_index;
        i = parent !== undefined ? parent : (i - 1);
      }
      
      for (const idx of path) {
        const version = versions[idx];
        if (!version.user_message || !version.ai_response) continue;
        
        const userMsg = document.createElement('div');
        userMsg.style.cssText = 'margin-bottom: 12px; padding: 12px 16px; background: #f0f0f0; border-radius: 12px 12px 4px 12px; max-width: 80%; margin-left: auto;';
        userMsg.innerHTML = `<div style="font-size: 12px; color: #666; margin-bottom: 4px; text-align: right;">你</div><div style="color: #313131; line-height: 1.6;">${escapeHtml(version.user_message)}</div>`;
        historyDiv.appendChild(userMsg);
        
        const aiPreview = version.ai_response.length > 100 ? version.ai_response.substring(0, 100) + '...' : version.ai_response;
        const aiMsg = document.createElement('div');
        aiMsg.style.cssText = 'margin-bottom: 12px; padding: 12px 16px; background: linear-gradient(135deg, #313131 0%, #4a4a4a 100%); color: white; border-radius: 12px 12px 12px 4px; max-width: 80%;';
        aiMsg.innerHTML = `<div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px;">AI助手</div><div style="line-height: 1.8; white-space: pre-wrap;">${escapeHtml(aiPreview)}</div>`;
        historyDiv.appendChild(aiMsg);
      }
      
      historyDiv.scrollTop = historyDiv.scrollHeight;
    }
    
    loadProject();
  </script>
</body>
</html>
