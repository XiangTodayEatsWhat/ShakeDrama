<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目详情 - 专业级标准化格式剧本生成</title>
  <!-- 本地 http://0.0.0.0 等非安全上下文下 Google Fonts 会触发 CORS/Private Network 拦截，故注释掉；正式环境可改用 HTTPS 或自行取消注释 -->
  <!-- link rel="preconnect" href="https://fonts.googleapis.com" -->
  <!-- link rel="preconnect" href="https://fonts.gstatic.com" crossorigin -->
  <!-- link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  <style>
    /* 顶栏：短剧剧本 + 项目/新建/样本库 三个按钮 - 固定在上方且始终有实色背景，不压住下面任何内容 */
    #header {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1000 !important;
      background-color: #ffffff !important;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
    /* 整页内容从顶栏下方开始，绝不与顶栏重叠（body 留出顶栏高度） */
    body.index-page {
      padding-top: 120px !important;
    }
    /* main 再留出一段间距，保证「Project / 标题」和正文都在顶栏下面 */
    .main {
      padding-top: 50px !important;
    }
    
    /* 黑色主题的状态提示框 */
    .alert {
      border-radius: 8px;
      padding: 16px 20px;
      font-weight: 500;
      border: none;
    }
    
    .alert-info {
      background: linear-gradient(135deg, #3a3a3a 0%, #4a4a4a 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(49, 49, 49, 0.3);
    }
    
    .alert-warning {
      background: linear-gradient(135deg, #313131 0%, #454545 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(49, 49, 49, 0.3);
    }
    
    .alert-success {
      background: linear-gradient(135deg, #2a2a2a 0%, #3d3d3d 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(42, 42, 42, 0.4);
    }
    
    .alert-secondary {
      background: linear-gradient(135deg, #404040 0%, #505050 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(64, 64, 64, 0.3);
    }
    
    /* 优化自动刷新指示器颜色 */
    #autoRefreshIndicator {
      color: #666 !important;
      font-size: 13px;
      background: rgba(102, 102, 102, 0.08);
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 500;
    }
    
    #autoRefreshIndicator i {
      color: var(--accent-color);
      animation: rotate 2s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* 优化日志容器滚动性能 */
    #logContainer {
      contain: layout style paint;
    }
    
    #logContainer::-webkit-scrollbar {
      width: 8px;
    }
    
    #logContainer::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }
    
    #logContainer::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      transition: background 0.3s ease;
    }
    
    #logContainer::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="index-page">
  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="/projects" class="logo d-flex align-items-center">
        <h1 class="sitename">专业级标准化格式剧本生成</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="/projects">项目</a></li>
          <li><a href="/create">新建</a></li>
          <li><a href="#" onclick="localStorage.removeItem('auth_token');window.location.href='/login.html';return false;" style="color:#dc3545;">退出</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main">
    <section id="detail" class="section">
      <div class="container section-title" data-aos="fade-up">
        <span class="subtitle">Project</span>
        <h2 id="projectTitle">加载中...</h2>
      </div>

      <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row mb-4">
          <div class="col-md-8">
            <div class="alert alert-info" id="statusAlert" style="display:none;"></div>
          </div>
          <div class="col-md-4 text-end">
            <a href="/projects" class="btn-outline" style="display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: transparent; color: var(--heading-color); border: 1px solid rgba(102,102,102,0.2); text-decoration: none; border-radius: 6px; font-weight: 500;">
              <i class="bi bi-arrow-left"></i> 返回列表
            </a>
          </div>
        </div>

        <div class="row gy-4">
          <div class="col-lg-8">
            <div class="service-item" style="padding: 40px; background: var(--surface-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
              <div class="d-flex align-items-center mb-4">
                <div class="service-icon" style="width: 70px; height: 70px; background: linear-gradient(135deg, var(--accent-color), #555); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 20px;">
                  <i class="bi bi-play-circle" style="font-size: 32px; color: white;"></i>
                </div>
                <div style="flex: 1;">
                  <h3 style="margin: 0; font-size: 1.5rem;">项目信息</h3>
                  <p style="margin: 0; color: var(--default-color);" id="projectMeta">加载中...</p>
                </div>
                <div id="autoRefreshIndicator" style="display: none; color: #28a745; font-size: 14px;">
                  <i class="bi bi-arrow-repeat"></i> 自动刷新中
                </div>
              </div>
              
              <div id="projectIdea" class="mb-4"></div>
              
              <div class="progress mb-3" style="height: 12px; background: rgba(102,102,102,0.1); border-radius: 6px;">
                <div id="progressBar" class="progress-bar" style="width: 0%; background: var(--accent-color); border-radius: 6px;"></div>
              </div>
              <p class="text-center" id="progressText">0%</p>

              <div class="d-flex gap-3 mt-4">
                <button id="startBtn" onclick="startGeneration()" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--accent-color); color: var(--contrast-color); border: none; border-radius: 6px; font-weight: 500; cursor: pointer;">
                  <i class="bi bi-play-fill"></i> 开始创作
                </button>
                <button id="reviewBtn" onclick="showReviewModal()" class="btn-outline" style="display: none; align-items: center; gap: 8px; padding: 14px 28px; background: transparent; color: var(--heading-color); border: 2px solid rgba(102,102,102,0.2); border-radius: 6px; font-weight: 500; cursor: pointer;">
                  <i class="bi bi-lightbulb"></i> 查看创意内容
                </button>
              </div>
            </div>

            <!-- 实时日志区域 - 已隐藏 -->
            <div class="service-item mt-4" style="padding: 30px; background: var(--surface-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: none;">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h4 style="margin: 0; font-size: 1.25rem;"><i class="bi bi-terminal"></i> 生成日志</h4>
                <button onclick="toggleLogAutoScroll()" class="btn-outline" style="padding: 6px 12px; font-size: 12px; border-radius: 4px;">
                  <i class="bi bi-arrow-down-circle" id="autoScrollIcon"></i> <span id="autoScrollText">自动滚动</span>
                </button>
              </div>
              <div id="logContainer" style="background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 6px; max-height: 500px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; will-change: scroll-position; transform: translateZ(0); -webkit-overflow-scrolling: touch; scroll-behavior: smooth;">
                <div style="color: #888;">等待生成开始...</div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="service-item" style="padding: 30px; background: var(--surface-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
              <h4 style="margin-bottom: 20px; font-size: 1.25rem;">快速操作</h4>
              <div class="d-grid gap-2">
                <a href="javascript:void(0)" onclick="showPreviousStagesModal()" id="previousStagesLink" class="service-link" style="display: none; align-items: center; justify-content: space-between; padding: 12px 0; color: var(--default-color); text-decoration: none; border-bottom: 1px solid rgba(102,102,102,0.1); cursor: pointer;">
                  <span><i class="bi bi-journal-bookmark"></i> 以往阶段</span>
                  <i class="bi bi-arrow-right"></i>
                </a>
                <a href="javascript:void(0)" onclick="exportScript()" id="exportLink" class="service-link" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; color: var(--default-color); text-decoration: none; border-bottom: 1px solid rgba(102,102,102,0.1); cursor: pointer; opacity: 0.5;">
                  <span><i class="bi bi-download"></i> 导出剧本</span>
                  <i class="bi bi-arrow-right"></i>
                </a>
                <a href="javascript:void(0)" onclick="showProjectSettings()" class="service-link" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; color: var(--default-color); text-decoration: none; cursor: pointer;">
                  <span><i class="bi bi-gear"></i> 项目设置</span>
                  <i class="bi bi-arrow-right"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="footer" class="footer dark-background">
    <div class="container copyright text-center mt-4">
      <p>© <span>2026</span> <strong class="px-1 sitename">短剧剧本</strong> <span>AIGC 多智能体协作</span></p>
    </div>
  </footer>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/js/modal.js"></script>
  <script>
    // Token验证
    function checkAuth() {
      const token = localStorage.getItem('auth_token');
      if (!token) {
        window.location.href = '/login.html';
        return false;
      }
      return true;
    }
    
    // 页面加载时验证token
    if (!checkAuth()) {
      throw new Error('未授权访问');
    }
    
    AOS.init({ duration: 600, easing: 'ease-in-out', once: true, mirror: false });

    const projectId = new URLSearchParams(window.location.search).get('id');
    let project = null;
    // 当前编辑所基于的版本索引（选版本 1 再对话时，新版本记为「基于版本 1」；对话历史只显示该分支）
    let editingBaseVersionIndex = { inspiration: -1, synopsis: -1, overall_outline: -1, multi_outline: -1, characters: -1, beat_sheet: -1 };
    let autoRefreshTimer = null;
    let logAutoScroll = true;
    let lastLogLength = 0;
    let isUserScrolling = false;
    let scrollTimeout = null;
    const MAX_LOG_ENTRIES = 1000; // 最多保留1000条日志

    // 字数统计（汉字+字母+数字，与 Word 统计一致）
    function countScriptChars(text) {
      if (!text) return 0;
      var m = text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u{20000}-\u{2a6df}\u{2a700}-\u{2b73f}a-zA-Z0-9]/gu);
      return m ? m.length : 0;
    }
    function wordCountBadge(count) {
      var color = (count >= 500 && count <= 700) ? '#28a745' : (count < 500 ? '#dc3545' : '#fd7e14');
      return '<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:white;background:' + color + ';margin-left:6px;">' + count + '字</span>';
    }

    // 阶段图标与文案（与 axis 参考模版一致使用 Bootstrap Icons，替代 emoji）
    const stageIcons = { inspiration: 'bi-lightbulb', synopsis: 'bi-journal-text', characters: 'bi-people', overall_outline: 'bi-clipboard', multi_outline: 'bi-journal', beat_sheet: 'bi-list-ul' };
    const stageLabels = { inspiration: '创作灵感', synopsis: '故事梗概', characters: '人设', overall_outline: '总体大纲', multi_outline: '多集大纲', beat_sheet: '分集大纲' };
    function stageTitleHtml(st) { return '<i class="bi ' + (stageIcons[st] || 'bi-circle') + '"></i> ' + (stageLabels[st] || st); }

    // 角色原型英文 -> 中文（人设「类型」展示用）
    const archetypeLabels = {
      protagonist: '主角',
      love_interest: '爱情线',
      antagonist: '反派',
      supporting: '配角',
      minor: '次要角色',
      comic_relief: '搞笑担当',
      mentor: '导师',
      sidekick: '跟班'
    };

    async function continueProject(projectId) {
      try {
        const token = localStorage.getItem('auth_token');
        const response = await fetch(`/api/projects/${projectId}/continue`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });
        
        if (!response.ok) {
          const data = await response.json();
          await showAlert(data.detail || '继续生成失败', 'error');
          return;
        }
        const data = await response.json();
        await showAlert('<i class="bi bi-check-circle"></i> ' + (data.message || '已开始'), 'success');
        // 刷新页面状态
        await loadProject();
      } catch (err) {
        await showAlert('继续生成失败: ' + err.message, 'error');
      }
    }

    async function loadProject() {
      if (!projectId) {
        await showAlert('项目 ID 缺失', 'error');
        window.location.href = '/projects';
        return;
      }

      // 关闭可能残留的进度弹窗，避免挡住「继续」「查看」按钮
      try { closeProgressModal(); } catch (e) {}

      try {
        const token = localStorage.getItem('auth_token');
        const res = await fetch(`/api/projects/${projectId}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        if (res.status === 401) {
          localStorage.removeItem('auth_token');
          window.location.href = '/login.html';
          return;
        }
        if (!res.ok) throw new Error('加载失败');
        project = await res.json();
        
        const createdTime = new Date(project.created_at).toLocaleString('zh-CN', { 
          year: 'numeric', 
          month: '2-digit', 
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
        
        // 标题显示逻辑
        let displayTitle = project.title || '生成中...';
        
        document.getElementById('projectTitle').textContent = displayTitle;
        document.getElementById('projectMeta').textContent = `${project.target_audience || '通用'} · ${project.total_episodes} 集 · 创建于 ${createdTime}`;
        document.getElementById('projectIdea').innerHTML = `<p style="color: var(--default-color); line-height: 1.7;"><strong>创意：</strong>${project.user_idea || '无'}</p>`;
        
        const progress = project.total_episodes > 0 ? Math.round((project.current_episode / project.total_episodes) * 100) : 0;
        document.getElementById('progressBar').style.width = progress + '%';
        document.getElementById('progressText').textContent = `${project.current_episode}/${project.total_episodes} 集 (${progress}%)`;
        
        // 状态显示 - 根据创意阶段显示更详细的状态
        const ideationStage = project.ideation_stage || 'not_started';
        const stageLabels = {
          'not_started': '准备开始',
          'inspiration': '<i class="bi bi-check-circle"></i> 创作灵感已生成',
          'synopsis': '<i class="bi bi-check-circle"></i> 故事梗概已生成',
          'characters': '<i class="bi bi-check-circle"></i> 人物角色已创建',
          'overall_outline': '<i class="bi bi-check-circle"></i> 总体大纲已生成',
          'multi_outline': '<i class="bi bi-check-circle"></i> 多集大纲已生成',
          'beat_sheet': '<i class="bi bi-check-circle"></i> 分集大纲（审核中）',
          'completed': '<i class="bi bi-check-circle"></i> 创意策划全部完成'
        };
        
        let statusLabel = '';
        if (project.status === 'running') {
          statusLabel = '生成中...';
        } else if (project.status === 'checkpoint') {
          statusLabel = (project.script_review_batch_end != null)
            ? (function() {
                let s = project.script_review_batch_start || 1;
                let e = project.script_review_batch_end || 5;
                if (s > e) { var batchSize = (project.config && project.config.batch_size) || 5; s = Math.max(1, e - batchSize + 1); }
                return '剧本审稿（第' + s + '-' + e + '集）';
              })()
            : (stageLabels[ideationStage] || '等待审核');
        } else if (project.status === 'completed') {
          statusLabel = '已完成';
        } else if (project.status === 'failed') {
          statusLabel = (ideationStage === 'completed' ? '撰写失败，可点击下方按钮重试' : '失败');
        } else {
          statusLabel = '待开始';
        }
        
        const statusAlert = document.getElementById('statusAlert');
        statusAlert.innerHTML = `状态：${statusLabel}`;
        statusAlert.className = project.status === 'running' ? 'alert alert-info' : 
                                (project.status === 'completed' ? 'alert alert-success' : 
                                (project.status === 'failed' ? 'alert alert-danger' : 
                                (project.status === 'checkpoint' ? 'alert alert-warning' : 'alert alert-secondary')));
        statusAlert.style.display = 'block';
        
        const startBtn = document.getElementById('startBtn');
        const reviewBtn = document.getElementById('reviewBtn');
        const exportLink = document.getElementById('exportLink');
        
        // 撰写失败后仍停留在「创意策划完成」阶段，可再次点击开始撰写，不退回创意策划
        if (project.status === 'checkpoint' || (project.status === 'failed' && ideationStage === 'completed')) {
          // 剧本审稿卡点：本批已写完，等人审稿
          const inScriptReview = project.script_review_batch_end != null;
          if (inScriptReview) {
            let batchStart = project.script_review_batch_start || 1;
            let batchEnd = project.script_review_batch_end || 5;
            if (batchStart > batchEnd) { const batchSize = (project.config && project.config.batch_size) || 5; batchStart = Math.max(1, batchEnd - batchSize + 1); }
            startBtn.disabled = false;
            startBtn.style.pointerEvents = 'auto';
            startBtn.style.cursor = 'pointer';
            startBtn.innerHTML = '<i class="bi bi-check-circle"></i> 审核通过，继续下一批';
            startBtn.onclick = async (e) => {
              e.preventDefault();
              e.stopPropagation();
              showProgressModal();
              await continueProjectWithStream(projectId);
            };
            startBtn.classList.remove('btn-outline');
            startBtn.classList.add('btn-primary');
            reviewBtn.style.display = 'inline-flex';
            reviewBtn.style.pointerEvents = 'auto';
            reviewBtn.style.cursor = 'pointer';
            reviewBtn.innerHTML = '<i class="bi bi-journal-text"></i> 剧本审稿（第' + batchStart + '-' + batchEnd + '集）';
            reviewBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); showReviewModal(); };
          } else {
            const nextStepLabels = {
              'inspiration': '继续 → 生成故事梗概',
              'synopsis': '继续 → 生成人物角色',
              'characters': '继续 → 生成总体大纲',
              'overall_outline': '继续 → 生成多集大纲',
              'multi_outline': '继续 → 生成分集大纲',
              'beat_sheet': (function() {
                const nextStart = project.beat_sheet_next_start;
                const total = project.total_episodes || 80;
                if (!nextStart || nextStart > total) return '开始撰写剧本';
                const end = Math.min(nextStart + 9, total);
                return `继续 → 生成第${nextStart}-${end}集`;
              })(),
              'completed': '开始撰写剧本'
            };
            const nextLabel = nextStepLabels[ideationStage] || '继续';
            startBtn.disabled = false;
            startBtn.style.pointerEvents = 'auto';
            startBtn.style.cursor = 'pointer';
            startBtn.innerHTML = `<i class="bi bi-play-circle"></i> ${nextLabel}`;
            // 创意已完成（含撰写失败重试）时点击：先弹出 AI 生成进度弹窗，再流式拉日志，与其他阶段一致
            startBtn.onclick = async (e) => {
              e.preventDefault();
              e.stopPropagation();
              if (ideationStage === 'completed') {
                showProgressModal();
                await continueProjectWithStream(projectId);
              } else {
                showReviewModal();
              }
            };
            startBtn.classList.remove('btn-outline');
            startBtn.classList.add('btn-primary');
            const reviewLabels = {
              'inspiration': '查看创作灵感',
              'synopsis': '查看故事梗概',
              'characters': '查看人物角色',
              'overall_outline': '查看总体大纲',
              'multi_outline': '查看多集大纲',
              'beat_sheet': '审核分集大纲',
              'completed': '查看创意内容'
            };
            const reviewLabel = reviewLabels[ideationStage] || '查看创意内容';
            reviewBtn.style.display = 'inline-flex';
            reviewBtn.style.pointerEvents = 'auto';
            reviewBtn.style.cursor = 'pointer';
            reviewBtn.innerHTML = `<i class="bi bi-lightbulb"></i> ${reviewLabel}`;
            reviewBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); showReviewModal(); };
          }
          stopAutoRefresh();
        } else if (project.status === 'running') {
          startBtn.disabled = true;
          startBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 生成中...';
          startAutoRefresh();
        } else if (project.status === 'completed') {
          startBtn.innerHTML = '<i class="bi bi-check-circle"></i> 已完成';
          startBtn.disabled = true;
          stopAutoRefresh();
          const totalEps = project.total_episodes || 80;
          const fallbackBatchSize = (project.config && project.config.batch_size) || 5;
          const lastBatchStart = project.script_review_batch_start || Math.max(1, totalEps - fallbackBatchSize + 1);

          exportLink.style.pointerEvents = 'auto';

        // 若已进入创意阶段，加载 bible 并显示右侧「以往阶段」按钮

        if (ideationStage !== 'not_started') {

    function buildPreviousStagesCardsForPage(ideationStage, bible, project) {
      const order = ['inspiration', 'synopsis', 'characters', 'overall_outline', 'multi_outline', 'beat_sheet'];
      let idx = order.indexOf(ideationStage);
      // 撰写剧本/审稿阶段（ideationStage 为 completed 或不在 order 中）也展示全部创意阶段 + 已写剧本
      if (idx < 0) idx = order.length - 1;
      // 展示到当前阶段为止（含分集大纲），与创作灵感/梗概/人设等保持一致
      const cardBg = '#f5f5f5';
      const cardBorder = 'rgba(102,102,102,0.18)';
      let html = '';
      for (let i = 0; i <= idx; i++) {
        const st = order[i];
        const titleHtml = stageTitleHtml(st);
        let text = '';
        if (st === 'inspiration') {
          text = (project.inspiration || '').trim();
        } else if (st === 'synopsis') {
          text = (bible && bible.synopsis) ? bible.synopsis.trim() : '';
        } else if (st === 'characters') {
          const chars = bible && bible.characters ? (Array.isArray(bible.characters) ? bible.characters : Object.values(bible.characters)) : [];
          if (chars.length) {
            text = chars.map(function(c) {
              var parts = parseBackgroundParts(c.background || '');
              var bg = parts.background || (c.background || '').trim();
              var coreGoal = (c.core_goal || '').trim() || parts.core_goal;
              var memoryPoint = (c.memory_point || '').trim() || parts.memory_point;
              var typeLabel = archetypeLabels[c.archetype] || c.archetype || '未设置';
              var block = (c.name || '未命名') + '\n  身份：' + (c.identity || '') + '\n  类型：' + typeLabel + '\n  性格：' + (c.personality || '') + '\n  背景：' + bg + '\n  核心目标：' + coreGoal + '\n  记忆点：' + memoryPoint;
              var relList = c.relationships || [];
              block += '\n  关系：' + (relList.length ? relList.map(function(r) { return (r.target || '') + ' — ' + ((r.relation_type || r.relation || '').trim() || '（未填）'); }).join('；') : '（无）');
              return block;
            }).join('\n\n');
          }
        } else if (st === 'overall_outline') {
          text = (bible && bible.overall_outline) ? bible.overall_outline.trim() : '';
        } else if (st === 'multi_outline') {
          text = (bible && (bible.multi_episode_outline || bible.multi_outline)) ? (bible.multi_episode_outline || bible.multi_outline).trim() : '';
        } else if (st === 'beat_sheet') {
          const eps = bible && bible.beat_sheet && bible.beat_sheet.episodes ? bible.beat_sheet.episodes : [];
          if (eps.length) {
            text = eps.sort(function(a, b) { return (a.episode || 0) - (b.episode || 0); }).map(function(b) {
              return '第' + (b.episode || '') + '集\n  梗概：' + (b.synopsis || '') + '\n  结尾钩子：' + (b.ending_hook || '');
            }).join('\n\n');
          }
        }
        if (!text) text = '（暂无）';
        var dataOpen = '0';
        var bodyMaxHeight = '0';
        var chevronRotate = '0deg';
        html += '<div class="prev-stage-card" style="border-radius: 10px; border: 1px solid ' + cardBorder + '; background: ' + cardBg + '; overflow: hidden;">' +
          '<div class="prev-stage-header" onclick="togglePrevStageCard(this)" style="padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;">' +
            '<strong style="color: #313131; font-size: 15px;">' + titleHtml + '</strong>' +
            '<i class="bi bi-chevron-down prev-stage-chevron" style="font-size: 18px; color: #666; transition: transform 0.25s; transform: rotate(' + chevronRotate + ');"></i>' +
          '</div>' +
          '<div class="prev-stage-body" data-open="' + dataOpen + '" style="max-height: ' + bodyMaxHeight + '; overflow: hidden; transition: max-height 0.3s ease; overflow-y: auto;">' +
            '<div style="padding: 14px 16px; font-size: 14px; line-height: 1.6; color: #333; white-space: pre-wrap; word-break: break-word; border-top: 1px solid rgba(0,0,0,0.06);">' + escapeHtml(text) + '</div>' +
          '</div>' +
        '</div>';
      }
      // 若有已撰写的剧本（含人审修改后的版本），在以往阶段中增加「已撰写并修改的剧本」卡片；当前正在人审的批次不放入「以往阶段」
      const episodes = (bible && bible.episodes) ? bible.episodes : [];
      const rStart = project.script_review_batch_start;
      const rEnd = project.script_review_batch_end;
      const inReviewRange = function(num) { return rStart != null && rEnd != null && num >= rStart && num <= rEnd; };
      const pastEps = episodes.filter(function(ep) {
        const num = ep.number != null ? ep.number : ep.episode || 0;
        return !inReviewRange(num);
      });
      if (pastEps.length > 0) {
        const sortedEps = pastEps.slice().sort(function(a, b) { return (a.number != null ? a.number : a.episode || 0) - (b.number != null ? b.number : b.episode || 0); });
        sortedEps.forEach(function(ep) {
          const num = ep.number != null ? ep.number : ep.episode || 0;
          const script = (ep.full_script || '').trim() || '（暂无正文）';
          const dataOpen = '0';
          const bodyMaxHeight = '0';
          const chevronRotate = '0deg';
          html += '<div class="prev-stage-card" style="border-radius: 10px; border: 1px solid ' + cardBorder + '; background: ' + cardBg + '; overflow: hidden;">' +
            '<div class="prev-stage-header" onclick="togglePrevStageCard(this)" style="padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;">' +
              '<strong style="color: #313131; font-size: 15px;"><i class="bi bi-file-text"></i> 已撰写并修改的剧本 · 第' + num + '集' + wordCountBadge(countScriptChars(script)) + '</strong>' +
              '<i class="bi bi-chevron-down prev-stage-chevron" style="font-size: 18px; color: #666; transition: transform 0.25s; transform: rotate(' + chevronRotate + ');"></i>' +
            '</div>' +
            '<div class="prev-stage-body" data-open="' + dataOpen + '" style="max-height: ' + bodyMaxHeight + '; overflow: hidden; transition: max-height 0.3s ease; overflow-y: auto;">' +
              '<div style="padding: 14px 16px; font-size: 14px; line-height: 1.6; color: #333; white-space: pre-wrap; word-break: break-word; border-top: 1px solid rgba(0,0,0,0.06);">' + escapeHtml(script) + '</div>' +
            '</div>' +
          '</div>';
        });
      }
      return html;
    }

    // 剧本生成时界面只显示摘要：第X集开始/结束撰写、批量审稿等，不显示一大坨 STREAM 与冗长 INFO
    function shouldShowLogInUI(log) {
      var level = (log.level || '').trim();
      var msg = (log.message || '').trim();
      if (level === 'ERROR' || level === 'WARNING') return true;
      if (/^STREAM_/.test(level)) return false;
      if (level !== 'INFO' && level !== 'SUCCESS') return true;
      return /开始撰写第\d+集到第\d+集/.test(msg) ||
        /第\d+集：撰写/.test(msg) ||
        /第\d+集\s+已入 bible|第\d+集\s+已通过/.test(msg) ||
        /一致性检查/.test(msg) ||
        /本批第[\d\-]+集已生成|本批第[\d\-]+集已完成|等待人工审稿/.test(msg) ||
        /全部剧集撰写完成/.test(msg) ||
        /三角号后处理|已对通过审核的剧本执行三角号/.test(msg) ||
        /开始撰写剧本|开始生成任务/.test(msg) ||
        /正在审核第\d+集|开始批量审核|批量审核完成|审稿完成|开始审稿流程/.test(msg) ||
        /\[审稿Agent\]|第\d+集：字/.test(msg) ||
        /正在检查剧情一致性|一致性检查完成/.test(msg) ||
        /字数与AI|本批字数/.test(msg) ||
        /\[记忆官Agent\]|人审已通过.*记忆|上一批记忆更新/.test(msg) ||
        /^=+$/.test(msg);
    }
    // 从整行 log 中解析是否为 STREAM 行并取出正文（用于「正在生成中」显示部分生成内容）
    function parseStreamLog(logText) {
      if (!logText || typeof logText !== 'string') return null;
      var m = logText.match(/\[(STREAM_START|STREAM_APPEND|STREAM_APPEND_NL)\]\s*([\s\S]*)$/);
      if (m) return { level: m[1], content: m[2] };
      return null;
    }
    var MAX_STREAM_DISPLAY_LENGTH = 3000;
    function truncateStreamTail(text) {
      if (!text || text.length <= MAX_STREAM_DISPLAY_LENGTH) return text;
      return '...\n' + text.slice(-MAX_STREAM_DISPLAY_LENGTH);
    }
    function shouldShowLogLineInUI(logText) {
      if (!logText || typeof logText !== 'string') return false;
      if (/\[STREAM_START\]|\[STREAM_APPEND\]|\[STREAM_APPEND_NL\]/.test(logText)) return false;
      if (/\[ERROR\]|错误|失败/.test(logText)) return true;
      if (/\[WARNING\]|警告/.test(logText)) return true;
      var msg = logText.replace(/^\[\d{4}[^\]]*\]\s*\[[^\]]+\]\s*/, '').trim();
      return /开始撰写第\d+集到第\d+集/.test(msg) ||
        /第\d+集：撰写/.test(msg) ||
        /第\d+集\s+已入 bible|第\d+集\s+已通过/.test(msg) ||
        /一致性检查/.test(msg) ||
        /本批第[\d\-]+集已生成|本批第[\d\-]+集已完成|等待人工审稿/.test(msg) ||
        /全部剧集撰写完成/.test(msg) ||
        /三角号后处理|已对通过审核的剧本执行三角号/.test(msg) ||
        /开始撰写剧本|开始生成任务/.test(msg) ||
        /正在审核第\d+集|开始批量审核|批量审核完成|审稿完成|开始审稿流程/.test(msg) ||
        /\[审稿Agent\]|第\d+集：字/.test(msg) ||
        /正在检查剧情一致性|一致性检查完成/.test(msg) ||
        /字数与AI|本批字数/.test(msg) ||
        /\[记忆官Agent\]|人审已通过.*记忆|上一批记忆更新/.test(msg) ||
        /^=+$/.test(msg);
    }

    async function loadLogs() {
      try {
        const token = localStorage.getItem('auth_token');
        const res = await fetch(`/api/projects/${projectId}/logs`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (res.ok) {
          const data = await res.json();
          const logContainer = document.getElementById('logContainer');
          
          if (data.logs && data.logs.length > 0) {
            // 只有新增日志时才更新
            if (data.logs.length > lastLogLength) {
              const newLogs = data.logs.slice(lastLogLength).filter(shouldShowLogInUI);
              
              // 使用DocumentFragment批量添加，提升性能
              const fragment = document.createDocumentFragment();
              
              newLogs.forEach(log => {
                const logEntry = document.createElement('div');
                logEntry.style.marginBottom = '8px';
                logEntry.style.willChange = 'auto';
                const isStream = /^STREAM_/.test(log.level);
                if (isStream) {
                  logEntry.style.whiteSpace = 'pre-wrap';
                  logEntry.style.wordBreak = 'break-word';
                }
                const timestamp = new Date(log.timestamp).toLocaleTimeString('zh-CN');
                const levelColors = {
                  'INFO': '#4ec9b0',
                  'SUCCESS': '#28a745',
                  'WARNING': '#ffc107',
                  'ERROR': '#dc3545',
                  'DEBUG': '#888'
                };
                const color = levelColors[log.level] || '#d4d4d4';
                const msgSpanStyle = isStream ? 'color: #d4d4d4; white-space: pre-wrap; word-break: break-word;' : 'color: #d4d4d4;';
                logEntry.innerHTML = `
                  <span style="color: #888;">[${timestamp}]</span>
                  <span style="color: ${color}; font-weight: bold;">[${log.level}]</span>
                  <span style="${msgSpanStyle}">${escapeHtml(log.message)}</span>
                `;
                fragment.appendChild(logEntry);
              });
              
              logContainer.appendChild(fragment);
              lastLogLength = data.logs.length;
              
              // 限制日志数量，避免DOM元素过多
              const children = logContainer.children;
              if (children.length > MAX_LOG_ENTRIES) {
                const removeCount = children.length - MAX_LOG_ENTRIES;
                for (let i = 0; i < removeCount; i++) {
                  logContainer.removeChild(children[0]);
                }
              }
              
              // 只有在用户没有手动滚动且启用自动滚动时才滚动到底部
              if (logAutoScroll && !isUserScrolling) {
                requestAnimationFrame(() => {
                  logContainer.scrollTop = logContainer.scrollHeight;
                });
              }
            }
          } else if (lastLogLength === 0) {
            logContainer.innerHTML = '<div style="color: #888;">暂无日志记录</div>';
          }
        }
      } catch (err) {
        console.error('加载日志失败:', err);
      }
    }

    async function startGeneration() {
      if (!projectId) return;
      
      // 显示生成进度弹窗
      showProgressModal();
      
      try {
        const token = localStorage.getItem('auth_token');
        
        // 启动生成任务
        const res = await fetch(`/api/projects/${projectId}/start`, {

          }
        });
        
        if (res.status === 401) {
          closeProgressModal();

          return;
        }
        if (!res.ok) {
          closeProgressModal();
          throw new Error('启动失败');
        }
        
        // 连接日志流，实时显示
        await streamGenerationLogs(projectId);
        
      } catch (err) {
        closeProgressModal();
        await showAlert('启动失败: ' + err.message, 'error');
      }
    }
    
    // 流式读取生成日志（显示摘要 + 部分生成内容 STREAM）
    async function streamGenerationLogs(projectId) {
      const logContainer = document.getElementById('progressLogContainer');
      if (!logContainer) return;
      
      logContainer.innerHTML = '';
      
      try {
        const token = localStorage.getItem('auth_token');
        const streamUrl = `/api/projects/${projectId}/logs/stream`;
        const response = await fetch(streamUrl, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) {
          throw new Error('连接日志流失败');
        }
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        // SSE 以 \n\n 为一条事件边界
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';
          for (const event of events) {
            const line = event.split('\n')[0];
            if (!line || !line.startsWith('data: ')) continue;
              try {
                const data = JSON.parse(line.slice(6));
                
                if (data.log) {
                  if (data.append === true) {
                    // 二级框（流式生成内容）不显示
                  } else {
                    var logText = data.log;
                    var streamInfo = parseStreamLog(logText);
                    if (streamInfo) {
                      // 二级框（STREAM 流式内容）不显示
                    } else if (shouldShowLogLineInUI(logText)) {
                      var isError = logText.indexOf('[ERROR]') !== -1 || logText.indexOf('错误') !== -1 || logText.indexOf('失败') !== -1;
                      var isSuccess = logText.indexOf('[SUCCESS]') !== -1 || logText.indexOf('✅') !== -1;
                      var isWarning = logText.indexOf('[WARNING]') !== -1 || logText.indexOf('警告') !== -1;
                      var isInfo = logText.indexOf('[INFO]') !== -1;
                      var logEntry = document.createElement('div');
                      logEntry.style.marginBottom = '4px';
                      logEntry.style.lineHeight = '1.6';
                      logEntry.style.color = isError ? '#ff6b6b' : (isSuccess ? '#51cf66' : (isWarning ? '#ffd43b' : (isInfo ? '#4ec9b0' : '#d4d4d4')));
                      logEntry.textContent = logText;
                      logContainer.appendChild(logEntry);
                      logContainer.scrollTop = logContainer.scrollHeight;
                    }
                  }
                }
                
                if (data.done || data.status) {
                  setTimeout(() => {
                    closeProgressModal();
                    loadProject();
                  }, 1500);
                  break;
                }
              } catch (e) {
                console.error('解析日志失败:', e);
              }
          }
        }
        
      } catch (err) {
        closeProgressModal();
        await showAlert('读取生成日志失败: ' + err.message, 'error');
      }
    }

    // 导出剧本（支持中途导出）
    async function exportScript() {
      if (!project || (project.current_episode || 0) < 1) {
        await showAlert('尚无已生成的剧集，无法导出', 'warning');
        return;
      }

      const loading = showLoading('正在打包剧本文件...');

      try {
        const token = localStorage.getItem('auth_token');
        const response = await fetch(`/api/projects/${projectId}/export`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        hideLoading();

        if (response.ok) {
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);

    // 从「背景」字符串中拆出 核心目标、记忆点（支持 核心目标：/核心目标: 与 记忆点：/记忆点:）
    function parseBackgroundParts(backgroundStr) {
      var bg = (backgroundStr || '').trim();
      if (!bg) return { background: '', core_goal: '', memory_point: '' };
      var coreGoal = '';
      var memoryPoint = '';
      var backgroundOnly = bg;
      var iGoal = bg.indexOf('核心目标');
      var iPoint = bg.indexOf('记忆点');
      if (iGoal >= 0) {
        var afterGoal = bg.slice(iGoal + 4).replace(/^[：:\s]*/, '');
        if (iPoint > iGoal) {
          var idxPoint = afterGoal.indexOf('记忆点');
          coreGoal = (idxPoint >= 0 ? afterGoal.slice(0, idxPoint) : afterGoal).replace(/\s*记忆点[：:\s]*$/, '').trim();
        } else {
          coreGoal = afterGoal.trim();
        }
      }
      if (iPoint >= 0) {
        memoryPoint = bg.slice(iPoint + 3).replace(/^[：:\s]*/, '').trim();
      }
      coreGoal = (coreGoal || '').trim();
      memoryPoint = (memoryPoint || '').trim();
      if (iGoal >= 0 || iPoint >= 0) {
        var endBg = iGoal >= 0 && (iPoint < 0 || iGoal < iPoint) ? iGoal : iPoint;
        if (endBg >= 0) backgroundOnly = bg.slice(0, endBg).trim();
      }
      return { background: backgroundOnly, core_goal: coreGoal, memory_point: memoryPoint };
    }

    function fillCharacterFormFromChar(char) {
      if (!char) return;
      setElVal('charFieldName', char.name);
      setElVal('charFieldIdentity', char.identity);
      setElVal('charFieldArchetype', char.archetype || 'supporting');
      setElVal('charFieldPersonality', char.personality);
      var bg = char.background || '';
      var coreGoal = (char.core_goal || '').trim();
      var memoryPoint = (char.memory_point || '').trim();
      if (!coreGoal || !memoryPoint) {
        var parts = parseBackgroundParts(bg);
        if (!coreGoal) coreGoal = parts.core_goal;
        if (!memoryPoint) memoryPoint = parts.memory_point;
        if (!coreGoal && !memoryPoint) {
          setElVal('charFieldBackground', bg);
        } else {
          setElVal('charFieldBackground', parts.background);
        }
      } else {
        setElVal('charFieldBackground', bg);
      }
      setElVal('charFieldCoreGoal', coreGoal);
      setElVal('charFieldMemoryPoint', memoryPoint);
    }

      const char = window.currentBible.characters?.[originalName] || {};
      const name = (document.getElementById('charFieldName')?.value || '').trim();

        archetype: (document.getElementById('charFieldArchetype')?.value || '').trim() || undefined,
        personality: (document.getElementById('charFieldPersonality')?.value || '').trim() || undefined,
        background: (document.getElementById('charFieldBackground')?.value || '').trim() || undefined,
        core_goal: (document.getElementById('charFieldCoreGoal')?.value || '').trim() || undefined,
        memory_point: (document.getElementById('charFieldMemoryPoint')?.value || '').trim() || undefined

      if (char.secrets) character.secrets = char.secrets;
      if (char.arc) character.arc = char.arc;
      if (char.age != null) character.age = char.age;

        else if (stage === 'characters') {
          var chars = bible && bible.characters ? (Array.isArray(bible.characters) ? bible.characters : Object.values(bible.characters)) : [];
          text = chars.length ? chars.map(function(c){ return (c.name || '') + '：' + (c.identity || ''); }).join('；') : '';
        } else if (stage === 'overall_outline') text = (bible && bible.overall_outline) ? bible.overall_outline.trim() : '';
        else if (stage === 'multi_outline') text = (bible && (bible.multi_episode_outline || bible.multi_outline)) ? (bible.multi_episode_outline || bible.multi_outline).trim() : '';
        else if (stage === 'beat_sheet') {

        if (text && stage !== 'beat_sheet' && text.length > 400) text = text.slice(0, 400) + '…';

    // 剧本显示格式化：只保留单行换行，去掉整行空行；场景头加粗并去掉行首的 ##
    function formatScriptDisplay(script) {
      if (!script || !script.trim()) return '（暂无正文）';
      var s = script.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
      s = s.replace(/\n{2,}/g, '\n');
      var lines = s.split('\n');
      var out = [];
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (/^\s*##\s*/.test(line)) {
          var text = line.replace(/^\s*##\s*/, '');
          out.push('<strong>' + escapeHtml(text) + '</strong>');
        } else if (/^\s*\d+-\d+\s/.test(line)) {
          out.push('<strong>' + escapeHtml(line.trim()) + '</strong>');
        } else {
          out.push(escapeHtml(line));
        }
      }
      return out.join('<br/>');
    }

        content = `

              </div>

                    <thead><tr style="border-bottom:2px solid #ddd;"><th style="text-align:left;width:64px;padding:10px 10px 10px 0;font-size:13px;color:#555;">集数</th><th style="text-align:left;padding:10px 10px 10px 0;font-size:13px;color:#555;">剧情梗概</th><th style="text-align:left;width:160px;padding:10px 0 10px 10px;font-size:13px;color:#555;">结尾钩子</th></tr></thead>

                  <table style="width:100%;border-collapse:collapse;">
                    <thead><tr style="border-bottom:2px solid #ddd;"><th style="text-align:left;width:64px;padding:10px 10px 10px 0;font-size:13px;color:#555;">集数</th><th style="text-align:left;padding:10px 10px 10px 0;font-size:13px;color:#555;">剧情梗概</th><th style="text-align:left;width:160px;padding:10px 0 10px 10px;font-size:13px;color:#555;">结尾钩子</th></tr></thead>

      // 以往阶段已改在主界面「以往阶段（只读参考）」块展示，弹窗内不再重复
      return { title, content, btnLabel };
    }
    
    // 切换编辑/只读模式
    function toggleEdit(fieldId) {
      const display = document.getElementById(fieldId + '-display');
      const edit = document.getElementById(fieldId);
      const button = event.target.closest('button');
      
      if (edit.style.display === 'none') {
        // 切换到编辑模式
        display.style.display = 'none';
        edit.style.display = 'block';
        edit.focus();
        button.innerHTML = '<i class="bi bi-check"></i> 完成';
      } else {
        // 切换到只读模式
        display.textContent = edit.value;
        display.style.display = 'block';
        edit.style.display = 'none';
        button.innerHTML = '<i class="bi bi-pencil"></i> 编辑';
      }
    }
    
    // 切换对话区域折叠状态
    function toggleChatArea() {
      const content = document.getElementById('chatContent');
      const icon = document.getElementById('chatToggleIcon');
      
      if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.style.transform = 'rotate(0deg)';
      } else {
        content.style.display = 'none';
        icon.style.transform = 'rotate(-90deg)';
      }
    }
    
    // 切换内容区域折叠状态
    function toggleContentArea(contentId) {
      const content = document.getElementById(contentId);
      const iconId = contentId.replace('Content', 'ToggleIcon');
      const icon = document.getElementById(iconId);
      
      if (!content || !icon) return;
      
      if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.style.transform = 'rotate(0deg)';
      } else {
        content.style.display = 'none';
        icon.style.transform = 'rotate(-90deg)';
      }
    }

    function toggleCompBeatEdit() {
      const ro = document.getElementById('compBeatReadOnly');
      const ed = document.getElementById('compBeatEditTable');
      const btn = document.getElementById('compBeatEditBtn');
      const saveArea = document.getElementById('compBeatSaveArea');
      if (!ro || !ed) return;
      if (ed.style.display === 'none') {
        ro.style.display = 'none';
        ed.style.display = 'block';
        if (btn) btn.innerHTML = '<i class="bi bi-x"></i> 收起编辑';
        if (saveArea) saveArea.style.display = 'inline';
      } else {
        ro.style.display = 'block';
        ed.style.display = 'none';
        if (btn) btn.innerHTML = '<i class="bi bi-pencil"></i> 手动编辑';
        if (saveArea) saveArea.style.display = 'none';
      }
    }

    async function saveCompBeatSheet() {
      if (!window.currentBible) return;
      const panel = document.getElementById('compBeatPanel');
      const totalEp = panel ? parseInt(panel.getAttribute('data-total'), 10) || 0 : 0;
      const allEpisodes = (window.currentBible.beat_sheet && window.currentBible.beat_sheet.episodes) ? window.currentBible.beat_sheet.episodes.slice() : [];
      const edited = [];
      allEpisodes.forEach(function(b) {
        const ep = b.episode || 0;
        const synEl = document.getElementById('compBeatSynopsis' + ep);
        const hookEl = document.getElementById('compBeatHook' + ep);
        if (synEl || hookEl) {
          edited.push({
            episode: ep,
            synopsis: synEl ? (synEl.value || '').trim() : (b.synopsis || ''),
            ending_hook: hookEl ? (hookEl.value || '').trim() : (b.ending_hook || ''),
            hook_type: b.hook_type || ''
          });
        } else {
          edited.push(b);
        }
      });
      const projectId = new URLSearchParams(window.location.search).get('id');
      if (!projectId) { await showAlert('无法获取项目ID', 'error'); return; }
      const token = localStorage.getItem('auth_token');
      try {
        const res = await fetch('/api/projects/' + projectId + '/update', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ beat_sheet: { episodes: edited } })
        });
        if (!res.ok) { const err = await res.text(); throw new Error(err || res.status); }
        window.currentBible.beat_sheet = window.currentBible.beat_sheet || {};
        window.currentBible.beat_sheet.episodes = edited;
        // 同步只读视图
        const tbody = document.querySelector('#compBeatReadOnly table tbody');
        if (tbody) {
          tbody.innerHTML = edited.sort(function(a,b){return (a.episode||0)-(b.episode||0);}).map(function(b) {
            return '<tr style="border-bottom:1px solid #eee;">'
              + '<td style="vertical-align:top;width:64px;padding:10px 10px 10px 0;color:#666;font-size:13px;">第' + (b.episode||'') + '集</td>'
              + '<td style="vertical-align:top;padding:10px 10px 10px 0;font-size:13px;line-height:1.7;color:#333;">' + escapeHtml(b.synopsis||'') + '</td>'
              + '<td style="vertical-align:top;width:160px;font-size:13px;line-height:1.7;color:#555;padding:10px 0 10px 10px;">' + escapeHtml(b.ending_hook||'') + '</td>'
              + '</tr>';
          }).join('');
        }
        toggleCompBeatEdit();
        await showAlert('分集大纲已保存', 'success');
      } catch(e) {
        await showAlert('保存失败：' + (e.message || e), 'error');
      }
    }

    function toggleBeatSheetEdit() {
      const ro = document.getElementById('beatSheetReadOnly');
      const ed = document.getElementById('beatSheetEditTable');
      const btnText = document.getElementById('beatSheetEditBtnText');
      const saveArea = document.getElementById('beatSheetSaveArea');
      if (!ro || !ed) return;
      if (ed.style.display === 'none') {
        ro.style.display = 'none';
        ed.style.display = 'block';
        if (btnText) btnText.textContent = '收起编辑';
        if (saveArea) saveArea.style.display = 'inline';
      } else {
        ro.style.display = 'block';
        ed.style.display = 'none';
        if (btnText) btnText.textContent = '手动编辑本批';
        if (saveArea) saveArea.style.display = 'none';
      }
    }

    async function saveBeatSheetBatch() {
      const panel = document.getElementById('beatSheetPanel');
      if (!panel || !window.currentBible) return;
      const batchStart = parseInt(panel.getAttribute('data-batch-start'), 10) || 1;
      const batchEnd = parseInt(panel.getAttribute('data-batch-end'), 10) || 1;
      const allEpisodes = (window.currentBible.beat_sheet && window.currentBible.beat_sheet.episodes) ? window.currentBible.beat_sheet.episodes.slice() : [];
      const edited = [];
      for (let ep = batchStart; ep <= batchEnd; ep++) {
        const synEl = document.getElementById('beatSynopsis' + ep);
        const hookEl = document.getElementById('beatHook' + ep);
        if (!synEl || !hookEl) continue;
        edited.push({
          episode: ep,
          synopsis: (synEl.value || '').trim(),
          ending_hook: (hookEl.value || '').trim(),
          hook_type: (allEpisodes.find(function(b) { return (b.episode || 0) === ep; }) || {}).hook_type || ''
        });
      }
      const byNum = {};
      allEpisodes.forEach(function(b) { byNum[b.episode || 0] = b; });
      edited.forEach(function(b) { byNum[b.episode] = b; });
      const merged = Object.keys(byNum).map(function(k) { return parseInt(k, 10); }).sort(function(a, b) { return a - b; }).map(function(num) { return byNum[num]; });
      const projectId = new URLSearchParams(window.location.search).get('id');
      if (!projectId) {
        await showAlert('无法获取项目ID', 'error');
        return;
      }
      const token = localStorage.getItem('auth_token');
      const res = await fetch('/api/projects/' + projectId + '/update', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ beat_sheet: { episodes: merged } })
      });
      if (!res.ok) {
        const err = await res.text();
        await showAlert('保存失败：' + (err || res.status), 'error');
        return;
      }
      window.currentBible.beat_sheet = window.currentBible.beat_sheet || {};
      window.currentBible.beat_sheet.episodes = merged;
      toggleBeatSheetEdit();
      refreshReviewModalContent();
      await showAlert('本批分集大纲已保存', 'success');
    }
    
    // 发送对话消息（真实AI流式输出）
    async function sendChatMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (!message) {
        await showAlert('请输入修改建议', 'warning');
        return;
      }
      
      // 确定当前编辑的字段
      const ideationStage = project.ideation_stage || 'not_started';
      let field = 'inspiration';
      let currentContent = '';
      
      if (ideationStage === 'inspiration') {
        field = 'inspiration';
        const textarea = document.getElementById('reviewInspiration');
        currentContent = textarea ? textarea.value : (project.inspiration || '');
      } else if (ideationStage === 'synopsis') {
        field = 'synopsis';
        const textarea = document.getElementById('reviewSynopsis');
        currentContent = textarea ? textarea.value : '';
      } else if (ideationStage === 'overall_outline') {
        field = 'overall_outline';
        const textarea = document.getElementById('reviewOutline');
        currentContent = textarea ? textarea.value : '';
      } else if (ideationStage === 'multi_outline') {
        field = 'multi_outline';
        const textarea = document.getElementById('reviewMultiOutline');
        currentContent = textarea ? textarea.value : '';
      } else if (ideationStage === 'characters') {
        field = 'characters';
        currentContent = (window.currentBible && window.currentBible.characters) ? JSON.stringify(window.currentBible.characters, null, 2) : '{}';
      } else if (ideationStage === 'beat_sheet') {
        field = 'beat_sheet';
        const episodes = (window.currentBible && window.currentBible.beat_sheet && window.currentBible.beat_sheet.episodes) ? window.currentBible.beat_sheet.episodes : [];
        const nextStart = (project && project.beat_sheet_next_start) ? project.beat_sheet_next_start : 1;
        const batchStart = Math.max(1, nextStart - 10);
        const batchEnd = nextStart - 1;
        const currentBatch = episodes.filter(function(b) { const ep = b.episode || 0; return ep >= batchStart && ep <= batchEnd; }).sort(function(a, b) { return (a.episode || 0) - (b.episode || 0); });
        currentContent = JSON.stringify(currentBatch, null, 2);
      } else if (ideationStage === 'completed') {
        const sel = document.getElementById('completedFieldSelect');
        field = sel ? sel.value : 'inspiration';
        const b = window.currentBible || {};
        const idMap = { inspiration: 'compInspiration', synopsis: 'compSynopsis', overall_outline: 'compOutline', multi_outline: 'compMultiOutline' };
        const elemId = idMap[field];
        if (elemId) {
          const ta = document.getElementById(elemId);
          currentContent = ta ? ta.value : '';
          if (!currentContent) {
            if (field === 'inspiration') currentContent = b.inspiration || project.inspiration || '';
            else if (field === 'synopsis') currentContent = b.synopsis || '';
            else if (field === 'overall_outline') currentContent = b.overall_outline || '';
            else if (field === 'multi_outline') currentContent = b.multi_episode_outline || '';
          }
        } else if (field === 'characters') {
          currentContent = b.characters ? JSON.stringify(b.characters, null, 2) : '{}';
        } else if (field === 'beat_sheet') {
          const eps = (b.beat_sheet && b.beat_sheet.episodes) ? b.beat_sheet.episodes : [];
          currentContent = JSON.stringify(eps, null, 2);
        }
      }
      
      // 添加用户消息到历史
      const historyDiv = document.getElementById('chatHistory');
      const userMsg = document.createElement('div');
      userMsg.style.cssText = 'margin-bottom: 12px; padding: 12px 16px; background: #f0f0f0; border-radius: 12px 12px 4px 12px; max-width: 80%; margin-left: auto;';
      userMsg.innerHTML = `<div style="font-size: 12px; color: #666; margin-bottom: 4px; text-align: right;">你</div><div style="color: #313131; line-height: 1.6;">${escapeHtml(message)}</div>`;
      historyDiv.appendChild(userMsg);
      
      // 清空输入
      input.value = '';
      input.disabled = true;
      
      // 创建AI消息容器
      const aiMsg = document.createElement('div');
      aiMsg.id = 'aiResponse';
      aiMsg.style.cssText = 'margin-bottom: 12px; padding: 12px 16px; background: linear-gradient(135deg, #313131 0%, #4a4a4a 100%); color: white; border-radius: 12px 12px 12px 4px; max-width: 80%;';
      aiMsg.innerHTML = `<div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px;">AI助手</div><div id="aiContent" style="line-height: 1.8; white-space: pre-wrap;"></div>`;
      historyDiv.appendChild(aiMsg);
      
      const aiContent = document.getElementById('aiContent');
      aiContent.textContent = '正在生成...';
      
      // 滚动到底部
      historyDiv.scrollTop = historyDiv.scrollHeight;
      
      try {
        const token = localStorage.getItem('auth_token');
        const response = await fetch(`/api/projects/${projectId}/chat`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: message,
            field: field,
            current_content: currentContent
          })
        });
        
        if (!response.ok) {
          throw new Error('AI响应失败');
        }
        
        // 读取流式响应
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let accumulatedText = '';
        
        aiContent.textContent = '';
        
        while (true) {
          const { done, value } = await reader.read();
          if (value && value.length) {
            buffer += decoder.decode(value, { stream: true });
          }
          var lines = buffer.split('\n');
          if (!done) {
            buffer = lines.pop() || '';
          } else {
            buffer = '';
          }
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              
              if (data.chunk) {
                aiContent.textContent += data.chunk;
                historyDiv.scrollTop = historyDiv.scrollHeight;
              }
              if (data.done && data.final_content != null) {
                accumulatedText = data.final_content;
                  
                  if (field === 'characters') {
                    try {
                      var raw = (accumulatedText || '').trim();
                      var codeMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
                      if (codeMatch) raw = (codeMatch[1] || '').trim();
                      var start = raw.indexOf('{');
                      if (start < 0) start = raw.indexOf('[');
                      var end = raw.lastIndexOf('}');
                      if (end < 0) end = raw.lastIndexOf(']');
                      if (start >= 0 && end > start) raw = raw.slice(start, end + 1);
                      var parsed = JSON.parse(raw);
                      if (Array.isArray(parsed)) {
                        var obj = {};
                        parsed.forEach(function(c) { if (c && c.name) obj[c.name] = c; });
                        parsed = obj;
                      }
                      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                        var updateRes = await fetch(`/api/projects/${projectId}/update`, {
                          method: 'POST',
                          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                          body: JSON.stringify({ characters: parsed })
                        });
                        if (!updateRes.ok) {
                          await showAlert('人设保存到服务器失败，请重试', 'error');
                          return;
                        }
                        try {
                          var bibleRes = await fetch(`/api/projects/${projectId}/bible`, { headers: { 'Authorization': `Bearer ${token}` } });
                          if (bibleRes.ok) {
                            var serverBible = await bibleRes.json();
                            window.currentBible = serverBible;
                            window.currentCharacterList = Object.values(serverBible.characters || {});
                          }
                        } catch (e) { /* 忽略 */ }
                        refreshCharacterModalContent();
                        await saveVersion('characters', JSON.stringify(parsed), message, accumulatedText, editingBaseVersionIndex['characters']);
                        await loadVersionHistory('characters');
                        var tip = document.createElement('div');
                        tip.style.cssText = 'margin-top: 12px; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 6px; font-size: 12px; opacity: 0.9;';
                        tip.innerHTML = '<i class="bi bi-check-circle"></i> 完整人设已更新并保存，已加入版本历史';
                        aiMsg.appendChild(tip);
                      } else {
                        aiContent.textContent += '\n\n解析失败：需要返回一个 JSON 对象（全部人设）';
                      }
                    } catch (e) {
                      aiContent.textContent += '\n\n解析失败：' + e.message;
                    }
                  } else if (field === 'beat_sheet') {
                    try {
                      var raw = (accumulatedText || '').trim();
                      var codeMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
                      if (codeMatch) raw = (codeMatch[1] || '').trim();
                      var start = raw.indexOf('[');
                      var end = raw.lastIndexOf(']');
                      if (start >= 0 && end > start) raw = raw.slice(start, end + 1);
                      var parsed = JSON.parse(raw);
                      if (!Array.isArray(parsed) || parsed.length === 0) {
                        aiContent.textContent += '\n\n解析失败：需要返回本批分集的 JSON 数组';
                        break;
                      }
                      var allEpisodes = (window.currentBible && window.currentBible.beat_sheet && window.currentBible.beat_sheet.episodes) ? window.currentBible.beat_sheet.episodes.slice() : [];
                      var nextStart = (project && project.beat_sheet_next_start) ? project.beat_sheet_next_start : 1;
                      var batchStart = Math.max(1, nextStart - 10);
                      var batchEnd = nextStart - 1;
                      var byNum = {};
                      allEpisodes.forEach(function(b) { byNum[b.episode || 0] = b; });
                      parsed.forEach(function(b) {
                        var ep = b.episode || 0;
                        if (ep >= batchStart && ep <= batchEnd) byNum[ep] = { episode: ep, synopsis: b.synopsis || '', ending_hook: b.ending_hook || '', hook_type: b.hook_type || '' };
                      });
                      var merged = Object.keys(byNum).map(function(k) { return parseInt(k, 10); }).sort(function(a, b) { return a - b; }).map(function(num) { return byNum[num]; });
                      var updateRes = await fetch('/api/projects/' + projectId + '/update', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ beat_sheet: { episodes: merged } })
                      });
                      if (!updateRes.ok) {
                        await showAlert('分集大纲保存失败，请重试', 'error');
                        break;
                      }
                      window.currentBible.beat_sheet = window.currentBible.beat_sheet || {};
                      window.currentBible.beat_sheet.episodes = merged;
                      refreshReviewModalContent();
                      var batchVersionField = 'beat_sheet_' + batchStart + '_' + batchEnd;
                      var batchSlice = merged.filter(function(b) { var ep = b.episode || 0; return ep >= batchStart && ep <= batchEnd; });
                      await saveVersion(batchVersionField, JSON.stringify(batchSlice), message, accumulatedText, editingBaseVersionIndex[batchVersionField]);
                      await loadVersionHistory(batchVersionField, { restoreChat: false });
                      var tip = document.createElement('div');
                      tip.style.cssText = 'margin-top: 12px; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 6px; font-size: 12px; opacity: 0.9;';
                      tip.innerHTML = '<i class="bi bi-check-circle"></i> 本批分集大纲已更新并保存，已加入版本历史';
                      aiMsg.appendChild(tip);
                    } catch (e) {
                      aiContent.textContent += '\n\n解析失败：' + e.message;
                    }
                  } else if (field === 'character' || (field && field.startsWith('character_'))) {
                    try {
                      let raw = (accumulatedText || '').trim();
                      const codeMatch = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
                      if (codeMatch) raw = (codeMatch[1] || '').trim();
                      const parsed = JSON.parse(raw);
                      const name = parsed.name || window.currentEditingCharacterName;
                      const originalName = window.currentEditingCharacterName;
                      if (name && window.currentBible) {
                        if (!window.currentBible.characters) window.currentBible.characters = {};
                        if (originalName && originalName !== name) delete window.currentBible.characters[originalName];
                        window.currentBible.characters[name] = parsed;
                        window.currentEditingCharacterName = name;
                        window.currentCharacterList = Object.values(window.currentBible.characters);
                        const updatePayload = { character: parsed };
                        if (originalName != null && String(originalName).trim() !== '') updatePayload.character_original_name = String(originalName).trim();
                        const updateRes = await fetch(`/api/projects/${projectId}/update`, {
                          method: 'POST',
                          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                          body: JSON.stringify(updatePayload)
                        });
                        if (!updateRes.ok) {
                          await showAlert('人设保存到服务器失败，请重试', 'error');
                          return;
                        }
                        try {
                          const bibleRes = await fetch(`/api/projects/${projectId}/bible`, { headers: { 'Authorization': `Bearer ${token}` } });
                          if (bibleRes.ok) {
                            const serverBible = await bibleRes.json();
                            window.currentBible = serverBible;
                            window.currentCharacterList = Object.values(serverBible.characters || {});
                          }
                        } catch (e) { /* 忽略，沿用本地状态 */ }
                        refreshCharacterModalContent();
                        const tip = document.createElement('div');
                        tip.style.cssText = 'margin-top: 12px; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 6px; font-size: 12px; opacity: 0.9;';
                        tip.innerHTML = '<i class="bi bi-check-circle"></i> 该角色人设已更新并保存';
                        aiMsg.appendChild(tip);
                      } else {
                        aiContent.textContent += '\n\n解析失败：未得到有效角色名';
                      }
                    } catch (e) {
                      aiContent.textContent += '\n\n解析失败：' + e.message;
                    }
                  } else {
                    // 更新对应的编辑框
                    if (field === 'inspiration') {
                      const textarea = document.getElementById('reviewInspiration');
                      const display = document.getElementById('reviewInspiration-display');
                      if (textarea) textarea.value = accumulatedText;
                      if (display) display.textContent = accumulatedText;
                    } else if (field === 'synopsis') {
                      const textarea = document.getElementById('reviewSynopsis');
                      const display = document.getElementById('reviewSynopsis-display');
                      if (textarea) textarea.value = accumulatedText;
                      if (display) display.textContent = accumulatedText;
                    } else if (field === 'overall_outline') {
                      const textarea = document.getElementById('reviewOutline');
                      const display = document.getElementById('reviewOutline-display');
                      if (textarea) textarea.value = accumulatedText;
                      if (display) display.textContent = accumulatedText;
                    } else if (field === 'multi_outline') {
                      const textarea = document.getElementById('reviewMultiOutline');
                      const display = document.getElementById('reviewMultiOutline-display');
                      if (textarea) textarea.value = accumulatedText;
                      if (display) display.textContent = accumulatedText;
                    }
                    // completed 阶段：同步 textarea 和 display，并通过 API 保存
                    const curStage = (project && project.ideation_stage) || '';
                    if (curStage === 'completed') {
                      const idMap = { inspiration: 'compInspiration', synopsis: 'compSynopsis', overall_outline: 'compOutline', multi_outline: 'compMultiOutline' };
                      const elemId = idMap[field];
                      if (elemId) {
                        const ta = document.getElementById(elemId);
                        const disp = document.getElementById(elemId + '-display');
                        if (ta) ta.value = accumulatedText;
                        if (disp) disp.textContent = accumulatedText;
                      }
                      const updatePayload = {};
                      updatePayload[field] = accumulatedText;
                      try {
                        await fetch('/api/projects/' + projectId + '/update', {
                          method: 'POST',
                          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                          body: JSON.stringify(updatePayload)
                        });
                      } catch (e) { /* ignore */ }
                    }
                    await saveVersion(field, accumulatedText, message, accumulatedText, editingBaseVersionIndex[field]);
                    const tip = document.createElement('div');
                    tip.style.cssText = 'margin-top: 12px; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 6px; font-size: 12px; opacity: 0.9;';
                    tip.innerHTML = '<i class="bi bi-check-circle"></i> 内容已更新并保存为新版本';
                    aiMsg.appendChild(tip);
                  }
                }
                
                if (data.error) {
                  aiContent.innerHTML = '<i class="bi bi-x-circle"></i> ' + escapeHtml(data.error);
                  await showAlert(data.error, 'error');
                }
                
              } catch (e) {
                console.error('解析响应失败:', e);
              }
            }
          if (done) break;
        }
        
      } catch (err) {
        aiContent.innerHTML = '<i class="bi bi-x-circle"></i> 生成失败: ' + escapeHtml(err.message);
        await showAlert('AI生成失败: ' + err.message, 'error');
      } finally {
        input.disabled = false;
        historyDiv.scrollTop = historyDiv.scrollHeight;
      }
    }

    // 仅刷新审核弹窗内容区（用于 AI/手动 更新分集大纲等后重绘表格）
    // 分集大纲阶段会先重新拉取 bible，避免「本批暂无数据」（project 已推进但 bible 未刷新）
    async function refreshReviewModalContent() {
      const area = document.getElementById('modalContentArea');
      if (!area || !project) return;
      const ideationStage = project.ideation_stage || 'not_started';
      var bible = window.currentBible || {};
      if (ideationStage === 'beat_sheet') {
        try {
          const token = localStorage.getItem('auth_token');
          const res = await fetch('/api/projects/' + projectId + '/bible', { headers: { 'Authorization': 'Bearer ' + (token || '') } });
          if (res.ok) {
            bible = await res.json();
            window.currentBible = bible;
          }
        } catch (e) { console.error('刷新Bible失败:', e); }
      }
      const modalData = generateModalContent(ideationStage, bible, null);
      area.innerHTML = modalData.content;
    }
    
    // 关闭审核弹窗
    function closeReviewModal() {
      const modal = document.getElementById('reviewModal');
      if (modal) {
        modal.style.animation = 'fadeOut 0.2s ease';
        setTimeout(() => modal.remove(), 200);
      }
    }

    // 连续生成到指定集数
    async function showBatchGenModal() {
      var total = (project && project.total_episodes) || 80;
      var current = (project && project.current_episode) || 0;
      var defaultTarget = Math.min(current + 30, total);
      window._batchTargetVal = String(defaultTarget);
      var html = '<div style="margin-bottom:12px;color:#555;font-size:14px;">当前已生成到第 ' + current + ' 集，总共 ' + total + ' 集。</div>'
        + '<div style="margin-bottom:8px;font-weight:600;">目标集数：</div>'
        + '<input id="_batchTarget" type="number" min="' + (current + 1) + '" max="' + total + '" value="' + defaultTarget + '" oninput="window._batchTargetVal=this.value" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:15px;">'
        + '<div style="margin-top:10px;color:#888;font-size:12px;">将跳过中间审稿，连续生成到目标集数。</div>';
      var confirmed = await showConfirm(html, '连续生成到...');
      if (!confirmed) return;
      var el = document.getElementById('_batchTarget');
      var target = parseInt(el ? el.value : window._batchTargetVal, 10);
      if (!target || target <= current || target > total) {
        await showAlert('目标集数无效', 'error');
        return;
      }
      closeReviewModal();
      showProgressModal();
      try {
        var token = localStorage.getItem('auth_token');
        var resp = await fetch('/api/projects/' + projectId + '/continue_to', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_episode: target })
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || '请求失败');
        await streamGenerationLogs(projectId);
      } catch (e) {
        await showAlert('操作失败: ' + (e.message || String(e)), 'error');
      }
    }

    // 切换剧本审稿当前集（右侧点选后左侧显示对应集）
    function switchScriptReviewEpisode(epNum) {
      var bodies = document.querySelectorAll('.script-ep-body');
      for (var i = 0; i < bodies.length; i++) {
        bodies[i].style.display = bodies[i].id === 'scriptBody_' + epNum ? 'flex' : 'none';
      }
      var btns = document.querySelectorAll('.script-ep-btn');
      for (var j = 0; j < btns.length; j++) {

          btn.style.background = '#313131';

          btn.style.borderColor = '#e0e0e0';

      }
